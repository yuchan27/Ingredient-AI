name: app_medium
description: "A high-quality AI-powered food raw material analyzer."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.6
  image_picker: ^1.1.2
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_dotenv: ^5.2.1
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
